<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Banco Agricola RD</title>
  <style>
    :root {
      --ink: #17201b;
      --muted: #5d6961;
      --line: #d7ddd8;
      --panel: #ffffff;
      --wash: #f5f6f1;
      --green: #23684a;
      --teal: #2b7c83;
      --gold: #c4962e;
      --red: #b85b4a;
      --gray: #738079;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--wash);
      letter-spacing: 0;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 24px;
      padding: 28px clamp(18px, 4vw, 44px);
      background: #fdfdf9;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 760;
    }
    .eyebrow {
      margin: 0 0 7px;
      color: var(--green);
      font-weight: 720;
      text-transform: uppercase;
      font-size: 12px;
    }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }
    select {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 34px 9px 12px;
      background: white;
      color: var(--ink);
      font: inherit;
    }
    main { padding: 24px clamp(18px, 4vw, 44px) 44px; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .kpi, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .kpi { padding: 16px; min-height: 108px; }
    .label { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .value { margin-top: 12px; font-size: 24px; line-height: 1.05; font-weight: 780; }
    .subvalue { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .grid {
      display: grid;
      grid-template-columns: 1.25fr .75fr;
      gap: 18px;
      align-items: start;
    }
    .panel { padding: 18px; min-width: 0; }
    .panel h2 {
      margin: 0 0 15px;
      font-size: 17px;
      line-height: 1.2;
    }
    .wide { grid-column: 1 / -1; }
    svg { width: 100%; height: auto; display: block; overflow: visible; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; background: #fff; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; background: #f8f8f4; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted); font-size: 13px; margin-top: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    @media (max-width: 900px) {
      header { align-items: start; flex-direction: column; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .kpis { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
      .value { font-size: 22px; }
    }
  </style>
</head>

    const money = new Intl.NumberFormat('es-DO', { style: 'currency', currency: 'DOP', maximumFractionDigits: 0 });
    const number = new Intl.NumberFormat('es-DO', { maximumFractionDigits: 0 });
    const colors = ['#23684a', '#c4962e', '#2b7c83', '#b85b4a', '#738079', '#7a5f35'];

    const yearSelect = document.getElementById('year');
    yearSelect.innerHTML = '<option value="all">Todos</option>' + DATA.years.map(y => `<option value="${y}">${y}</option>`).join('');
    yearSelect.value = 'all';
    yearSelect.addEventListener('change', render);

    function filterYear(items) {
      const year = yearSelect.value;
      return year === 'all' ? items : items.filter(item => String(item.year) === year);
    }

    function sum(items, field) {
      return items.reduce((acc, item) => acc + Number(item[field] || 0), 0);
    }

    function aggregate(items, keyField, valueField, extra) {
      const map = new Map();
      items.forEach(item => {
        const key = item[keyField];
        if (!map.has(key)) map.set(key, { name: key, value: 0, extra: 0, item });
        const row = map.get(key);
        row.value += Number(item[valueField] || 0);
        if (extra) row.extra += Number(item[extra] || 0);
      });
      return [...map.values()].sort((a, b) => b.value - a.value);
    }

    function shortMoney(value) {
      if (Math.abs(value) >= 1_000_000_000) return 'RD$ ' + (value / 1_000_000_000).toFixed(1) + 'B';
      if (Math.abs(value) >= 1_000_000) return 'RD$ ' + (value / 1_000_000).toFixed(1) + 'M';
      return money.format(value);
    }

    function renderKpis() {
      const cartera = filterYear(DATA.carteraByBranchYear);
      const destinos = filterYear(DATA.destinoByYear);
      const flows = filterYear(DATA.flows);
      const areas = filterYear(DATA.areasByBranchYear);
      const kpis = [
        ['Cartera total', shortMoney(sum(cartera, 'value')), number.format(sum(cartera, 'loans')) + ' prestamos'],
        ['Montos por destino', shortMoney(sum(destinos, 'value')), number.format(sum(destinos, 'beneficiados')) + ' beneficiados'],
        ['Desembolsos', shortMoney(sum(flows, 'desembolsos')), shortMoney(sum(flows, 'cobros')) + ' cobrados'],
        ['Areas financiadas', number.format(sum(areas, 'tareas')) + ' tareas', shortMoney(sum(areas, 'value'))]
      ];
      document.getElementById('kpis').innerHTML = kpis.map(([label, value, sub]) =>
        `<article class="kpi"><div class="label">${label}</div><div class="value">${value}</div><div class="subvalue">${sub}</div></article>`
      ).join('');
    }

    function renderBar() {
      const rows = aggregate(filterYear(DATA.carteraByBranchYear), 'branch', 'value', 'loans').slice(0, 10);
      const max = Math.max(...rows.map(r => r.value), 1);
      const width = 920, rowH = 34, left = 190, top = 14, chartW = width - left - 92;
      const height = top * 2 + rows.length * rowH;
      let svg = `<svg viewBox="0 0 ${width} ${height}" role="img">`;
      rows.forEach((r, i) => {
        const y = top + i * rowH;
        const w = Math.max(2, chartW * r.value / max);
        svg += `<text x="0" y="${y + 20}" font-size="13" fill="#17201b">${escapeHtml(r.name)}</text>`;
        svg += `<rect x="${left}" y="${y + 4}" width="${w}" height="20" rx="4" fill="${colors[i % colors.length]}"></rect>`;
        svg += `<text x="${left + w + 8}" y="${y + 20}" font-size="12" fill="#5d6961">${shortMoney(r.value)}</text>`;
      });
      svg += '</svg>';
      document.getElementById('barChart').innerHTML = svg;
    }

    function piePath(cx, cy, r, start, end) {
      const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
      const x2 = cx + r * Math.cos(end), y2 = cy + r * Math.sin(end);
      const large = end - start > Math.PI ? 1 : 0;
      return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
    }

    function renderPie() {
      const byType = aggregate(filterYear(DATA.destinoByYear), 'tipo', 'value');
      const total = Math.max(sum(byType, 'value'), 1);
      let angle = -Math.PI / 2;
      let svg = '<svg viewBox="0 0 360 260" role="img">';
      byType.slice(0, 6).forEach((r, i) => {
        const next = angle + (r.value / total) * Math.PI * 2;
        svg += `<path d="${piePath(130, 130, 94, angle, next)}" fill="${colors[i % colors.length]}" stroke="#fff" stroke-width="2"></path>`;
        angle = next;
      });
      svg += `<circle cx="130" cy="130" r="48" fill="#fff"></circle>`;
      svg += `<text x="130" y="126" text-anchor="middle" font-size="13" fill="#5d6961">Total</text>`;
      svg += `<text x="130" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="#17201b">${shortMoney(total)}</text>`;
      svg += '</svg>';
      document.getElementById('pieChart').innerHTML = svg;
      document.getElementById('pieLegend').innerHTML = byType.slice(0, 6).map((r, i) =>
        `<span><i class="dot" style="background:${colors[i % colors.length]}"></i>${escapeHtml(r.name)}</span>`
      ).join('');
    }

    function renderFlow() {
      const rows = filterYear(DATA.flows).sort((a, b) => a.year - b.year || a.month - b.month);
      const width = 920, height = 300, left = 58, bottom = 42, top = 22, chartH = height - top - bottom;
      if (rows.length === 0) {

            <text x="${width / 2}" y="126" text-anchor="middle" font-size="20" font-weight="700" fill="#17201b">No hay datos</text>

      const max = Math.max(...rows.flatMap(r => [r.desembolsos, r.cobros]), 1);

      let svg = `<svg viewBox="0 0 ${width} ${height}" role="img">`;

      rows.forEach((r, i) => {

    }

    function renderTable() {
      const rows = aggregate(filterYear(DATA.destinoByYear), 'destino', 'value', 'beneficiados').slice(0, 14);
      document.getElementById('destinoRows').innerHTML = rows.map(r => {
        const tipo = r.item.tipo || 'General';
        return `<tr><td>${escapeHtml(r.name)}</td><td>${escapeHtml(tipo)}</td><td class="num">${money.format(r.value)}</td><td class="num">${number.format(r.extra)}</td></tr>`;
      }).join('');
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[ch]));
    }

    function render() {
      renderKpis();
      renderBar();
      renderPie();
      renderFlow();
      renderTable();
    }
    render();
  </script>
</body>
</html>
